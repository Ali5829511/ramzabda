[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# ─── Required Environment Variables ──────────────────────────────────────────
# Set these in your Railway project's Variables tab:
#
#   VITE_SUPABASE_URL      – Your Supabase project URL
#                            e.g. https://abcdefghijklmnop.supabase.co
#
#   VITE_SUPABASE_ANON_KEY – Your Supabase project anonymous/public key
#
# When these variables are present, the app will read from and write to
# Supabase automatically. When absent, data is persisted to localStorage only.
# ─────────────────────────────────────────────────────────────────────────────
